<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day 08 — Markdown Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-color: #1e2122;
      --modal-bg: #2d3436;
      --secondary-bg: #3b4244;
      --accent-gold: #d4af37;
      --text-main: #ffffff;
      --text-muted: #dfe6e9;
      --modal-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    /* ── Modal ── */
    .modal {
      background: var(--modal-bg);
      width: 100%;
      max-width: 940px;
      padding: 2.5rem;
      border-radius: 16px;
      box-shadow: var(--modal-shadow);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-top: 4px solid var(--accent-gold);
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .modal-title {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--accent-gold);
    }

    .modal-subtitle {
      font-size: 0.875rem;
      font-weight: 300;
      color: var(--text-muted);
      margin-top: -1rem;
    }

    /* ── Two-Panel Layout ── */
    .editor-layout {
      display: flex;
      gap: 1.5rem;
      align-items: stretch;
    }

    .editor-panel,
    .preview-panel {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    /* ── Panel Labels ── */
    .panel-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ── Markdown Textarea ── */
    #mdInput {
      flex: 1;
      min-height: 340px;
      background: var(--secondary-bg);
      color: var(--text-main);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 1rem;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.85rem;
      line-height: 1.65;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }

    #mdInput:focus {
      border-color: var(--accent-gold);
    }

    .editor-stats {
      font-size: 0.75rem;
      font-weight: 300;
      color: var(--text-muted);
      opacity: 0.7;
      text-align: right;
    }

    /* ── Preview Pane ── */
    .preview-content {
      flex: 1;
      min-height: 340px;
      background: var(--secondary-bg);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 8px;
      padding: 1.25rem 1.4rem;
      overflow-y: auto;
      line-height: 1.75;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    /* ── Preview Typography ── */
    .preview-content h1,
    .preview-content h2,
    .preview-content h3,
    .preview-content h4,
    .preview-content h5,
    .preview-content h6 {
      color: var(--accent-gold);
      font-weight: 600;
      line-height: 1.3;
      margin: 1.1em 0 0.4em;
    }

    .preview-content h1 { font-size: 1.55rem; }
    .preview-content h2 { font-size: 1.25rem; }
    .preview-content h3 { font-size: 1.05rem; }
    .preview-content h4 { font-size: 0.95rem; }
    .preview-content h5,
    .preview-content h6 { font-size: 0.875rem; }

    .preview-content h1:first-child,
    .preview-content h2:first-child,
    .preview-content h3:first-child { margin-top: 0; }

    .preview-content p { margin: 0.6em 0; }

    .preview-content strong { color: var(--text-main); font-weight: 600; }
    .preview-content em { font-style: italic; color: #b2bec3; }
    .preview-content s { opacity: 0.5; }

    .preview-content code {
      background: #1e2122;
      color: #fd79a8;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.82em;
      padding: 0.15em 0.4em;
      border-radius: 4px;
    }

    .preview-content pre {
      background: #1a1d1e;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 1rem;
      overflow-x: auto;
      margin: 0.8em 0;
    }

    .preview-content pre code {
      background: none;
      color: #55efc4;
      padding: 0;
      font-size: 0.85em;
      line-height: 1.6;
    }

    .preview-content blockquote {
      border-left: 3px solid var(--accent-gold);
      margin: 0.8em 0;
      padding: 0.4em 0 0.4em 1rem;
      color: #b2bec3;
      font-style: italic;
    }

    .preview-content ul,
    .preview-content ol {
      margin: 0.6em 0;
      padding-left: 1.6em;
    }

    .preview-content li { margin: 0.25em 0; }

    .preview-content hr {
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      margin: 1.2em 0;
    }

    .preview-content a {
      color: var(--accent-gold);
      text-decoration: none;
    }

    .preview-content a:hover { text-decoration: underline; }

    /* ── Output Section ── */
    .output-section {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .output-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .snippet-box {
      background: #1a1d1e;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 1rem;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.78rem;
      line-height: 1.6;
      color: #55efc4;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 200px;
      overflow-y: auto;
    }

    /* ── Copy Button ── */
    .copy-btn {
      padding: 0.5rem 1.25rem;
      font-family: 'Outfit', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      background: transparent;
      border: 1.5px solid var(--accent-gold);
      border-radius: 8px;
      color: var(--accent-gold);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .copy-btn:hover { background: var(--accent-gold); color: #1e2122; }
    .copy-btn.copied { background: #00b894; border-color: #00b894; color: #fff; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .modal { padding: 1.5rem; }
      .editor-layout { flex-direction: column; }
      #mdInput { min-height: 200px; }
      .preview-content { min-height: 200px; }
    }
  </style>
</head>
<body>
  <div class="modal">
    <h1 class="modal-title">Markdown Preview</h1>
    <p class="modal-subtitle">Write Markdown on the left, see a live HTML render on the right.</p>

    <div class="editor-layout">
      <!-- Left: Markdown editor -->
      <div class="editor-panel">
        <div class="panel-label">Markdown</div>
        <textarea id="mdInput" spellcheck="false" oninput="render()"></textarea>
        <div class="editor-stats" id="editorStats">0 words · 0 chars</div>
      </div>

      <!-- Right: Rendered preview -->
      <div class="preview-panel">
        <div class="panel-label">Preview</div>
        <div class="preview-content" id="previewContent"></div>
      </div>
    </div>

    <!-- Below: Raw HTML output -->
    <div class="output-section">
      <div class="output-header">
        <span class="output-label">HTML Output</span>
        <button class="copy-btn" id="copyBtn" onclick="copyHtml()">Copy HTML</button>
      </div>
      <pre class="snippet-box" id="snippetBox"></pre>
    </div>
  </div>

  <script>
    /* ── State ── */
    let rawHtml = '';

    /* ── Starter Markdown ── */
    const STARTER = `# Hello, Markdown!

Welcome to the **live Markdown preview** tool. Edit this text on the left and watch it render instantly on the right.

## Features

- **Bold** and *italic* text
- ~~Strikethrough~~ support
- \`Inline code\` highlighting
- Fenced code blocks
- Blockquotes
- Ordered and unordered lists
- Horizontal rules
- [Hyperlinks](https://example.com)

## Code Example

\`\`\`
function greet(name) {
  return \`Hello, \${name}!\`;
}
\`\`\`

## Blockquote

> The best tool is the one you'll actually use.

## Ordered List

1. Write your Markdown
2. See the live preview
3. Copy the HTML output

---

Made with vanilla JS — no libraries.
`;

    /* ── Markdown Parser ── */
    function parseMarkdown(md) {
      // Split into lines
      const lines = md.split('\n');
      const out = [];
      let i = 0;

      while (i < lines.length) {
        const line = lines[i];

        // Fenced code block
        if (/^```/.test(line)) {
          const lang = line.slice(3).trim();
          const codeLines = [];
          i++;
          while (i < lines.length && !/^```/.test(lines[i])) {
            codeLines.push(escHtml(lines[i]));
            i++;
          }
          out.push(`<pre><code>${codeLines.join('\n')}</code></pre>`);
          i++;
          continue;
        }

        // Heading
        const hMatch = line.match(/^(#{1,6})\s+(.+)/);
        if (hMatch) {
          const level = hMatch[1].length;
          out.push(`<h${level}>${inlineTransform(hMatch[2])}</h${level}>`);
          i++;
          continue;
        }

        // Horizontal rule
        if (/^---+$/.test(line.trim())) {
          out.push('<hr>');
          i++;
          continue;
        }

        // Blockquote — collect consecutive > lines
        if (/^>\s?/.test(line)) {
          const bqLines = [];
          while (i < lines.length && /^>\s?/.test(lines[i])) {
            bqLines.push(inlineTransform(lines[i].replace(/^>\s?/, '')));
            i++;
          }
          out.push(`<blockquote>${bqLines.join('<br>')}</blockquote>`);
          continue;
        }

        // Unordered list — collect consecutive - or * lines
        if (/^[-*]\s+/.test(line)) {
          const items = [];
          while (i < lines.length && /^[-*]\s+/.test(lines[i])) {
            items.push(`<li>${inlineTransform(lines[i].replace(/^[-*]\s+/, ''))}</li>`);
            i++;
          }
          out.push(`<ul>${items.join('')}</ul>`);
          continue;
        }

        // Ordered list — collect consecutive N. lines
        if (/^\d+\.\s+/.test(line)) {
          const items = [];
          while (i < lines.length && /^\d+\.\s+/.test(lines[i])) {
            items.push(`<li>${inlineTransform(lines[i].replace(/^\d+\.\s+/, ''))}</li>`);
            i++;
          }
          out.push(`<ol>${items.join('')}</ol>`);
          continue;
        }

        // Empty line — separator (no output; paragraphs wrap non-empty runs)
        if (line.trim() === '') {
          i++;
          continue;
        }

        // Paragraph — collect consecutive non-special lines
        const paraLines = [];
        while (
          i < lines.length &&
          lines[i].trim() !== '' &&
          !/^(#{1,6}\s|---+$|```|>\s?|[-*]\s+|\d+\.\s+)/.test(lines[i])
        ) {
          paraLines.push(inlineTransform(lines[i]));
          i++;
        }
        if (paraLines.length) {
          out.push(`<p>${paraLines.join('<br>')}</p>`);
        }
      }

      return out.join('\n');
    }

    /* ── Inline Transforms ── */
    function inlineTransform(text) {
      return text
        // Escape HTML first for safety
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        // Inline code (before bold/italic to avoid conflicts)
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        // Bold
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        // Italic (single asterisk or underscore, not preceded by word char to avoid mid-word)
        .replace(/\*([^*\n]+)\*/g, '<em>$1</em>')
        .replace(/_([^_\n]+)_/g, '<em>$1</em>')
        // Strikethrough
        .replace(/~~(.+?)~~/g, '<s>$1</s>')
        // Links
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    }

    /* ── HTML Escape (for code blocks) ── */
    function escHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    /* ── Word/Char Stats ── */
    function updateStats(md) {
      const chars = md.length;
      const words = md.trim() === '' ? 0 : md.trim().split(/\s+/).length;
      document.getElementById('editorStats').textContent =
        `${words.toLocaleString()} word${words !== 1 ? 's' : ''} · ${chars.toLocaleString()} char${chars !== 1 ? 's' : ''}`;
    }

    /* ── Render ── */
    function render() {
      const md = document.getElementById('mdInput').value;
      rawHtml = parseMarkdown(md);
      document.getElementById('previewContent').innerHTML = rawHtml;
      document.getElementById('snippetBox').textContent = rawHtml;
      updateStats(md);
    }

    /* ── Copy HTML ── */
    function copyHtml() {
      if (!rawHtml) return;
      navigator.clipboard.writeText(rawHtml).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy HTML';
          btn.classList.remove('copied');
        }, 1500);
      });
    }

    /* ── Init ── */
    document.getElementById('mdInput').value = STARTER;
    render();
  </script>
</body>
</html>
