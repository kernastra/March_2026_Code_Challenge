<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day 07 — SVG Wave/Blob Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset + Variables ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-color: #1e2122;
      --modal-bg: #2d3436;
      --secondary-bg: #3b4244;
      --accent-gold: #d4af37;
      --text-main: #ffffff;
      --text-muted: #dfe6e9;
      --modal-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }

    /* ── Body + Modal ── */
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem 3rem;
    }

    .modal {
      background: var(--modal-bg);
      border-top: 4px solid var(--accent-gold);
      border-radius: 16px;
      box-shadow: var(--modal-shadow);
      padding: 2.5rem;
      width: 100%;
      max-width: 860px;
    }

    .modal-title {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--accent-gold);
      margin-bottom: 0.25rem;
    }

    .modal-subtitle {
      font-size: 0.875rem;
      font-weight: 300;
      color: var(--text-muted);
      margin-bottom: 1.75rem;
    }

    /* ── Editor Layout ── */
    .editor-layout {
      display: flex;
      gap: 1.5rem;
      align-items: flex-start;
    }

    /* ── Controls Panel ── */
    .controls-panel {
      width: 280px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .control-section {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent-gold);
    }

    /* Mode Toggle */
    .mode-toggle {
      display: flex;
      background: var(--secondary-bg);
      border-radius: 8px;
      padding: 3px;
      gap: 3px;
    }

    .mode-btn {
      flex: 1;
      padding: 0.45rem 0.75rem;
      font-family: 'Outfit', sans-serif;
      font-size: 0.8rem;
      font-weight: 400;
      background: transparent;
      border: none;
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .mode-btn.active {
      background: var(--accent-gold);
      color: #1e2122;
      font-weight: 600;
    }

    /* Preset Buttons */
    .preset-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }

    .preset-btn {
      padding: 0.4rem 0.6rem;
      font-family: 'Outfit', sans-serif;
      font-size: 0.78rem;
      font-weight: 400;
      background: var(--secondary-bg);
      border: 1px solid transparent;
      border-radius: 7px;
      color: var(--text-muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      text-align: center;
    }

    .preset-btn:hover { border-color: var(--accent-gold); color: var(--text-main); }
    .preset-btn.active { border-color: var(--accent-gold); color: var(--accent-gold); }

    /* Sliders */
    .slider-row {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .slider-label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .slider-label {
      font-size: 0.78rem;
      font-weight: 300;
      color: var(--text-muted);
    }

    .control-value {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-main);
      min-width: 2.5rem;
      text-align: right;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 5px;
      background: var(--secondary-bg);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent-gold);
      cursor: pointer;
      transition: transform 0.1s;
    }

    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }
    input[type="range"]::-moz-range-thumb {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--accent-gold);
      border: none;
      cursor: pointer;
    }

    /* Button Groups (Layers, Smooth/Sharp) */
    .btn-group {
      display: flex;
      gap: 0.4rem;
    }

    .btn-group-btn {
      flex: 1;
      padding: 0.35rem 0.5rem;
      font-family: 'Outfit', sans-serif;
      font-size: 0.76rem;
      font-weight: 400;
      background: var(--secondary-bg);
      border: 1px solid transparent;
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      text-align: center;
    }

    .btn-group-btn.active { border-color: var(--accent-gold); color: var(--accent-gold); }
    .btn-group-btn:hover:not(.active) { border-color: rgba(212,175,55,0.4); color: var(--text-main); }

    /* Toggle Row */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle-label {
      font-size: 0.78rem;
      font-weight: 300;
      color: var(--text-muted);
    }

    .toggle-switch {
      position: relative;
      width: 36px;
      height: 20px;
      cursor: pointer;
    }

    .toggle-switch input { opacity: 0; width: 0; height: 0; }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--secondary-bg);
      border-radius: 20px;
      transition: background 0.2s;
    }

    .toggle-switch input:checked + .toggle-track { background: var(--accent-gold); }

    .toggle-track::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 14px;
      height: 14px;
      background: var(--text-main);
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle-switch input:checked + .toggle-track::after { transform: translateX(16px); }

    /* Color Row */
    .color-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    input[type="color"] {
      -webkit-appearance: none;
      appearance: none;
      width: 36px;
      height: 36px;
      border: 2px solid var(--secondary-bg);
      border-radius: 8px;
      background: none;
      cursor: pointer;
      padding: 2px;
      flex-shrink: 0;
    }

    input[type="color"]:hover { border-color: var(--accent-gold); }

    /* Seed Row */
    .seed-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .seed-input {
      flex: 1;
      background: var(--secondary-bg);
      border: 1px solid transparent;
      border-radius: 7px;
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      font-size: 0.82rem;
      padding: 0.4rem 0.6rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .seed-input:focus { border-color: var(--accent-gold); }

    .randomize-btn {
      padding: 0.4rem 0.75rem;
      font-family: 'Outfit', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      background: var(--accent-gold);
      color: #1e2122;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    .randomize-btn:hover { opacity: 0.85; }

    /* Control Group visibility */
    .control-group { display: flex; flex-direction: column; gap: 0.75rem; }
    .control-group.hidden { display: none; }

    /* ── Preview Panel ── */
    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-width: 0;
    }

    .preview-stage {
      background: linear-gradient(135deg, #2c3e50 0%, #3d5a80 100%);
      border-radius: 10px;
      overflow: hidden;
      height: 200px;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .preview-stage svg {
      display: block;
      width: 100%;
      flex-shrink: 0;
    }

    .preview-stage.blob-mode {
      justify-content: center;
      align-items: center;
    }

    .preview-stage.blob-mode svg {
      width: auto;
      height: 160px;
      flex-shrink: 0;
    }

    /* Background swatches for preview */
    .bg-swatches {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .bg-swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
    }

    .bg-swatch:hover { transform: scale(1.1); }
    .bg-swatch.active { border-color: var(--accent-gold); }

    /* ── Output Section ── */
    .output-section {
      margin-top: 1.75rem;
      padding-top: 1.75rem;
      border-top: 1px solid var(--secondary-bg);
    }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .output-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent-gold);
    }

    .snippet-box {
      background: #1a1e1f;
      border: 1px solid var(--secondary-bg);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      line-height: 1.7;
      color: var(--text-muted);
      overflow-x: auto;
      white-space: pre;
      margin-bottom: 1rem;
      max-height: 220px;
      overflow-y: auto;
    }

    .token-selector { color: #74b9ff; }
    .token-prop     { color: #fd79a8; }
    .token-value    { color: #55efc4; }
    .token-punct    { color: #636e72; }
    .token-comment  { color: #636e72; font-style: italic; }

    .action-row {
      display: flex;
      justify-content: flex-end;
    }

    .copy-btn {
      padding: 0.55rem 1.4rem;
      font-family: 'Outfit', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      background: transparent;
      border: 1.5px solid var(--accent-gold);
      border-radius: 8px;
      color: var(--accent-gold);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .copy-btn:hover { background: var(--accent-gold); color: #1e2122; }
    .copy-btn.copied { background: #00b894; border-color: #00b894; color: #fff; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .modal { padding: 1.5rem; }
      .editor-layout { flex-direction: column; }
      .controls-panel { width: 100%; }
      .preview-stage { height: 160px; }
    }
  </style>
</head>
<body>
  <div class="modal">
    <h1 class="modal-title">SVG Wave / Blob Generator</h1>
    <p class="modal-subtitle">Create smooth SVG section dividers and decorative blobs — copy the code directly into your project.</p>

    <div class="editor-layout">

      <!-- ── Controls Panel ── -->
      <div class="controls-panel">

        <!-- Mode Toggle -->
        <div class="control-section">
          <div class="section-label">Shape Mode</div>
          <div class="mode-toggle">
            <button class="mode-btn active" id="modeWave" onclick="setMode('wave')">Wave</button>
            <button class="mode-btn" id="modeBlob" onclick="setMode('blob')">Blob</button>
          </div>
        </div>

        <!-- Presets -->
        <div class="control-section">
          <div class="section-label">Presets</div>
          <div class="preset-grid">
            <button class="preset-btn active" id="preset-gentle" onclick="applyPreset('gentle')">Gentle</button>
            <button class="preset-btn" id="preset-bold" onclick="applyPreset('bold')">Bold</button>
            <button class="preset-btn" id="preset-sharp" onclick="applyPreset('sharp')">Sharp</button>
            <button class="preset-btn" id="preset-blob" onclick="applyPreset('blob')">Blob</button>
          </div>
        </div>

        <!-- Wave Controls -->
        <div class="control-group" id="waveControls">
          <div class="section-label">Wave Settings</div>

          <div class="slider-row">
            <div class="slider-label-row">
              <span class="slider-label">Amplitude</span>
              <span class="control-value" id="ampVal">40</span>
            </div>
            <input type="range" id="ampSlider" min="10" max="80" value="40"
              oninput="state.amplitude=+this.value; document.getElementById('ampVal').textContent=this.value; clearPreset(); renderAll();" />
          </div>

          <div class="slider-row">
            <div class="slider-label-row">
              <span class="slider-label">Frequency</span>
              <span class="control-value" id="freqVal">2</span>
            </div>
            <input type="range" id="freqSlider" min="1" max="6" value="2"
              oninput="state.frequency=+this.value; document.getElementById('freqVal').textContent=this.value; clearPreset(); renderAll();" />
          </div>

          <div class="slider-row">
            <div class="slider-label-row">
              <span class="slider-label">Layers</span>
            </div>
            <div class="btn-group" id="layersBtns">
              <button class="btn-group-btn active" onclick="setLayers(1)">1</button>
              <button class="btn-group-btn" onclick="setLayers(2)">2</button>
              <button class="btn-group-btn" onclick="setLayers(3)">3</button>
            </div>
          </div>

          <div class="slider-row">
            <div class="slider-label-row">
              <span class="slider-label">Style</span>
            </div>
            <div class="btn-group" id="styleBtns">
              <button class="btn-group-btn active" onclick="setSmooth(true)">Smooth</button>
              <button class="btn-group-btn" onclick="setSmooth(false)">Sharp</button>
            </div>
          </div>

          <div class="toggle-row">
            <span class="toggle-label">Flip Horizontal</span>
            <label class="toggle-switch">
              <input type="checkbox" id="flipToggle" onchange="state.flipH=this.checked; clearPreset(); renderAll();" />
              <div class="toggle-track"></div>
            </label>
          </div>
        </div>

        <!-- Blob Controls -->
        <div class="control-group hidden" id="blobControls">
          <div class="section-label">Blob Settings</div>

          <div class="slider-row">
            <div class="slider-label-row">
              <span class="slider-label">Points</span>
              <span class="control-value" id="pointsVal">6</span>
            </div>
            <input type="range" id="pointsSlider" min="4" max="12" value="6"
              oninput="state.points=+this.value; document.getElementById('pointsVal').textContent=this.value; clearPreset(); renderAll();" />
          </div>

          <div class="slider-row">
            <div class="slider-label-row">
              <span class="slider-label">Roughness</span>
              <span class="control-value" id="roughVal">50</span>
            </div>
            <input type="range" id="roughSlider" min="0" max="100" value="50"
              oninput="state.roughness=+this.value; document.getElementById('roughVal').textContent=this.value; clearPreset(); renderAll();" />
          </div>

          <div class="slider-row">
            <div class="slider-label-row">
              <span class="slider-label">Seed</span>
            </div>
            <div class="seed-row">
              <input type="number" class="seed-input" id="seedInput" value="42" min="1" max="9999"
                oninput="state.seed=+this.value||42; clearPreset(); renderAll();" />
              <button class="randomize-btn" onclick="randomizeSeed()">&#x21bb; Randomize</button>
            </div>
          </div>
        </div>

        <!-- Shared: Color + Opacity -->
        <div class="control-section">
          <div class="section-label">Fill</div>
          <div class="color-row">
            <input type="color" id="colorPicker" value="#d4af37"
              oninput="state.color=this.value; clearPreset(); renderAll();" />
            <div class="slider-row" style="flex:1">
              <div class="slider-label-row">
                <span class="slider-label">Opacity</span>
                <span class="control-value" id="opacityVal">100%</span>
              </div>
              <input type="range" id="opacitySlider" min="10" max="100" value="100"
                oninput="state.opacity=+this.value; document.getElementById('opacityVal').textContent=this.value+'%'; clearPreset(); renderAll();" />
            </div>
          </div>
        </div>

      </div><!-- /controls-panel -->

      <!-- ── Preview Panel ── -->
      <div class="preview-panel">
        <div class="section-label" style="margin-bottom:0.25rem">Preview</div>

        <!-- Background swatches -->
        <div class="bg-swatches" id="bgSwatches">
          <button class="bg-swatch active" title="Ocean" style="background:linear-gradient(135deg,#2c3e50,#3d5a80)" onclick="selectBg('ocean',this)"></button>
          <button class="bg-swatch" title="Sunset" style="background:linear-gradient(135deg,#eb3349,#f45c43)" onclick="selectBg('sunset',this)"></button>
          <button class="bg-swatch" title="Forest" style="background:linear-gradient(135deg,#134e5e,#71b280)" onclick="selectBg('forest',this)"></button>
          <button class="bg-swatch" title="Night" style="background:linear-gradient(135deg,#0f0c29,#302b63)" onclick="selectBg('night',this)"></button>
          <button class="bg-swatch" title="Light" style="background:#f0f0f0" onclick="selectBg('light',this)"></button>
        </div>

        <div class="preview-stage" id="previewStage"></div>
      </div>

    </div><!-- /editor-layout -->

    <!-- ── Output Section ── -->
    <div class="output-section">
      <div class="output-header">
        <span class="output-label">SVG Code</span>
      </div>
      <pre class="snippet-box" id="snippetBox"></pre>
      <div class="action-row">
        <button class="copy-btn" id="copyBtn" onclick="copySnippet()">Copy SVG</button>
      </div>
    </div>

  </div><!-- /modal -->

  <script>
    /* ── State ── */
    const state = {
      mode: 'wave',
      amplitude: 40,
      frequency: 2,
      layers: 1,
      smooth: true,
      flipH: false,
      points: 6,
      roughness: 50,
      seed: 42,
      color: '#d4af37',
      opacity: 100,
      activePreset: 'gentle'
    };

    const BG_THEMES = {
      ocean:  'linear-gradient(135deg, #2c3e50 0%, #3d5a80 100%)',
      sunset: 'linear-gradient(135deg, #eb3349 0%, #f45c43 100%)',
      forest: 'linear-gradient(135deg, #134e5e 0%, #71b280 100%)',
      night:  'linear-gradient(135deg, #0f0c29 0%, #302b63 100%)',
      light:  '#f0f0f0'
    };
    let currentBg = 'ocean';

    const PRESETS = {
      gentle: { mode:'wave', amplitude:25, frequency:2, layers:1, smooth:true, flipH:false, color:'#d4af37', opacity:100 },
      bold:   { mode:'wave', amplitude:60, frequency:3, layers:2, smooth:true, flipH:false, color:'#d4af37', opacity:100 },
      sharp:  { mode:'wave', amplitude:40, frequency:4, layers:1, smooth:false, flipH:false, color:'#d4af37', opacity:100 },
      blob:   { mode:'blob', points:6, roughness:45, seed:42, color:'#d4af37', opacity:100 }
    };

    /* ── Seeded Random ── */
    function seededRandom(seed) {
      const x = Math.sin(seed * 9301 + 49297) * 233280;
      return x - Math.floor(x);
    }

    /* ── SVG Math: Wave ── */
    function generateWavePath(width, height, amp, freq, smooth, flip) {
      const baseline = height * 0.55;
      const step = width / freq;
      let d;

      if (smooth) {
        // Iterate over half-periods so control points are symmetric at every
        // zero-crossing, guaranteeing G1 continuity (no kinks).
        // k ≈ 0.3642 is the optimal factor for cubic-bezier sine approximation.
        const halfStep = width / (freq * 2);
        const k = 0.3642;
        d = `M 0 ${baseline}`;
        for (let i = 0; i < freq * 2; i++) {
          const x0 = i * halfStep;
          const x3 = x0 + halfStep;
          const yPeak = i % 2 === 0 ? baseline - amp : baseline + amp;
          d += ` C ${x0 + k * halfStep} ${yPeak}, ${x3 - k * halfStep} ${yPeak}, ${x3} ${baseline}`;
        }
      } else {
        // Sharp zigzag
        const pts = [`M 0 ${baseline}`];
        for (let i = 1; i <= freq * 2; i++) {
          const x = (i * step) / 2;
          const y = i % 2 === 1 ? baseline - amp : baseline;
          pts.push(`L ${x} ${y}`);
        }
        d = pts.join(' ');
      }

      d += ` L ${width} ${height} L 0 ${height} Z`;

      if (flip) {
        // Mirror horizontally via transform — embed in <g>
        return { d, flip: true, width };
      }
      return { d, flip: false, width };
    }

    /* ── SVG Math: Blob ── */
    function generateBlobPath(cx, cy, radius, numPoints, roughness, seed) {
      const rf = roughness / 100;
      const angleStep = (Math.PI * 2) / numPoints;
      const radii = [];
      for (let i = 0; i < numPoints; i++) {
        const r = seededRandom(seed + i * 17);
        radii.push(radius * (1 - rf * 0.5 + r * rf));
      }

      // Catmull-Rom → cubic bezier conversion
      const pts = radii.map((r, i) => {
        const angle = i * angleStep - Math.PI / 2;
        return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
      });

      function cp(p0, p1, p2, t) {
        return {
          x: p1.x + (p2.x - p0.x) * t / 6,
          y: p1.y + (p2.y - p0.y) * t / 6
        };
      }

      const n = pts.length;
      let d = `M ${pts[0].x.toFixed(2)} ${pts[0].y.toFixed(2)}`;
      for (let i = 0; i < n; i++) {
        const p0 = pts[(i - 1 + n) % n];
        const p1 = pts[i];
        const p2 = pts[(i + 1) % n];
        const p3 = pts[(i + 2) % n];
        const c1 = cp(p0, p1, p2, 1);
        const c2 = { x: p2.x - (p3.x - p1.x) / 6, y: p2.y - (p3.y - p1.y) / 6 };
        d += ` C ${c1.x.toFixed(2)} ${c1.y.toFixed(2)}, ${c2.x.toFixed(2)} ${c2.y.toFixed(2)}, ${p2.x.toFixed(2)} ${p2.y.toFixed(2)}`;
      }
      d += ' Z';
      return d;
    }

    /* ── Hex + Opacity → rgba ── */
    function hexOpacity(hex, opacityPct) {
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return `rgba(${r},${g},${b},${(opacityPct/100).toFixed(2)})`;
    }

    /* ── Render Preview ── */
    function renderPreview() {
      const stage = document.getElementById('previewStage');
      const { mode, amplitude, frequency, layers, smooth, flipH,
              points, roughness, seed, color, opacity } = state;

      stage.className = 'preview-stage' + (mode === 'blob' ? ' blob-mode' : '');

      if (mode === 'wave') {
        const W = 1440, H = 120;
        let svgContent = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" style="display:block;width:100%">`;

        for (let l = layers - 1; l >= 0; l--) {
          const layerAmp = amplitude * (1 + l * 0.2);
          const layerOffset = l * 8;
          const layerOpacity = l === 0 ? opacity / 100 : (opacity / 100) * 0.6;
          const { d, flip, width } = generateWavePath(W, H - layerOffset, layerAmp, frequency, smooth, flipH);
          const fill = `rgba(${hexToRgbArr(color).join(',')},${layerOpacity.toFixed(2)})`;

          if (flip) {
            svgContent += `<g transform="translate(${width},0) scale(-1,1)">`;
            svgContent += `<path d="${d}" fill="${fill}"/>`;
            svgContent += `</g>`;
          } else {
            svgContent += `<path d="${d}" fill="${fill}" transform="translate(0,${layerOffset})"/>`;
          }
        }

        svgContent += `</svg>`;
        stage.innerHTML = svgContent;

      } else {
        // Blob mode
        const SIZE = 200;
        const blobD = generateBlobPath(100, 100, 70, points, roughness, seed);
        const fill = hexOpacity(color, opacity);
        const svgContent = `<svg viewBox="0 0 ${SIZE} ${SIZE}" xmlns="http://www.w3.org/2000/svg"><path d="${blobD}" fill="${fill}"/></svg>`;
        stage.innerHTML = svgContent;
      }
    }

    function hexToRgbArr(hex) {
      return [
        parseInt(hex.slice(1,3),16),
        parseInt(hex.slice(3,5),16),
        parseInt(hex.slice(5,7),16)
      ];
    }

    /* ── Render Snippet ── */
    function renderSnippet() {
      const { mode, amplitude, frequency, layers, smooth, flipH,
              points, roughness, seed, color, opacity } = state;

      let lines = [];
      const p = (s) => `<span class="token-punct">${s}</span>`;
      const sel = (s) => `<span class="token-selector">${s}</span>`;
      const prop = (s) => `<span class="token-prop">${s}</span>`;
      const val = (s) => `<span class="token-value">"${s}"</span>`;

      const attr = (name, value) => `${prop(name)}${p('=')}${val(value)}`;

      if (mode === 'wave') {
        const W = 1440, H = 120;

        lines.push(`${p('<')}${sel('svg')}`);
        lines.push(`  ${attr('viewBox', `0 0 ${W} ${H}`)}`);
        lines.push(`  ${attr('xmlns', 'http://www.w3.org/2000/svg')}`);
        lines.push(`  ${attr('preserveAspectRatio', 'none')}${p('>')}`);

        for (let l = layers - 1; l >= 0; l--) {
          const layerAmp = amplitude * (1 + l * 0.2);
          const layerOffset = l * 8;
          const layerOpacity = l === 0 ? opacity / 100 : (opacity / 100) * 0.6;
          const { d, flip, width } = generateWavePath(W, H - layerOffset, layerAmp, frequency, smooth, flipH);
          const [r,g,b] = hexToRgbArr(color);
          const fillVal = `rgba(${r},${g},${b},${layerOpacity.toFixed(2)})`;

          if (flip) {
            lines.push(`  ${p('<')}${sel('g')} ${attr('transform', `translate(${width},0) scale(-1,1)`)}${p('>')}`);
            lines.push(`    ${p('<')}${sel('path')}`);
            lines.push(`      ${attr('d', truncateD(d))}`);
            lines.push(`      ${attr('fill', fillVal)}${p('/>')}`);
            lines.push(`  ${p('</')}${sel('g')}${p('>')}`);
          } else {
            const transform = layerOffset ? ` ${attr('transform', `translate(0,${layerOffset})`)}` : '';
            lines.push(`  ${p('<')}${sel('path')}`);
            lines.push(`    ${attr('d', truncateD(d))}`);
            lines.push(`    ${attr('fill', fillVal)}${transform}${p('/>')}`);
          }
        }

        lines.push(`${p('</')}${sel('svg')}${p('>')}`);

      } else {
        // Blob
        const SIZE = 200;
        const blobD = generateBlobPath(100, 100, 70, points, roughness, seed);
        const fill = hexOpacity(color, opacity);

        lines.push(`${p('<')}${sel('svg')}`);
        lines.push(`  ${attr('viewBox', `0 0 ${SIZE} ${SIZE}`)}`);
        lines.push(`  ${attr('xmlns', 'http://www.w3.org/2000/svg')}${p('>')}`);
        lines.push(`  ${p('<')}${sel('path')}`);
        lines.push(`    ${attr('d', truncateD(blobD))}`);
        lines.push(`    ${attr('fill', fill)}${p('/>')}`);
        lines.push(`${p('</')}${sel('svg')}${p('>')}`);
      }

      document.getElementById('snippetBox').innerHTML = lines.join('\n');
    }

    function truncateD(d) {
      return d.length > 60 ? d.slice(0, 57) + '...' : d;
    }

    /* ── Copy Snippet ── */
    function copySnippet() {
      const { mode, amplitude, frequency, layers, smooth, flipH,
              points, roughness, seed, color, opacity } = state;

      let svg;
      if (mode === 'wave') {
        const W = 1440, H = 120;
        let paths = '';
        for (let l = layers - 1; l >= 0; l--) {
          const layerAmp = amplitude * (1 + l * 0.2);
          const layerOffset = l * 8;
          const layerOpacity = l === 0 ? opacity / 100 : (opacity / 100) * 0.6;
          const { d, flip, width } = generateWavePath(W, H - layerOffset, layerAmp, frequency, smooth, flipH);
          const [r,g,b] = hexToRgbArr(color);
          const fill = `rgba(${r},${g},${b},${layerOpacity.toFixed(2)})`;
          if (flip) {
            paths += `\n  <g transform="translate(${width},0) scale(-1,1)">\n    <path d="${d}" fill="${fill}"/>\n  </g>`;
          } else {
            const transform = layerOffset ? ` transform="translate(0,${layerOffset})"` : '';
            paths += `\n  <path\n    d="${d}"\n    fill="${fill}"${transform}/>`;
          }
        }
        svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">${paths}\n</svg>`;
      } else {
        const blobD = generateBlobPath(100, 100, 70, points, roughness, seed);
        const fill = hexOpacity(color, opacity);
        svg = `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">\n  <path d="${blobD}" fill="${fill}"/>\n</svg>`;
      }

      navigator.clipboard.writeText(svg).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy SVG';
          btn.classList.remove('copied');
        }, 1500);
      });
    }

    /* ── Preset Logic ── */
    function applyPreset(key) {
      const p = PRESETS[key];
      Object.assign(state, p);
      state.activePreset = key;
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`preset-${key}`).classList.add('active');
      if (p.mode) setMode(p.mode, false);
      syncInputs();
      renderAll();
    }

    function clearPreset() {
      state.activePreset = null;
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    }

    /* ── Sync Inputs from State ── */
    function syncInputs() {
      const { amplitude, frequency, layers, smooth, flipH,
              points, roughness, seed, color, opacity } = state;

      document.getElementById('ampSlider').value = amplitude;
      document.getElementById('ampVal').textContent = amplitude;
      document.getElementById('freqSlider').value = frequency;
      document.getElementById('freqVal').textContent = frequency;

      // Layers buttons
      document.querySelectorAll('#layersBtns .btn-group-btn').forEach((b, i) => {
        b.classList.toggle('active', i + 1 === layers);
      });

      // Style buttons
      const styleBtns = document.querySelectorAll('#styleBtns .btn-group-btn');
      styleBtns[0].classList.toggle('active', smooth);
      styleBtns[1].classList.toggle('active', !smooth);

      document.getElementById('flipToggle').checked = flipH;

      document.getElementById('pointsSlider').value = points;
      document.getElementById('pointsVal').textContent = points;
      document.getElementById('roughSlider').value = roughness;
      document.getElementById('roughVal').textContent = roughness;
      document.getElementById('seedInput').value = seed;

      document.getElementById('colorPicker').value = color;
      document.getElementById('opacitySlider').value = opacity;
      document.getElementById('opacityVal').textContent = opacity + '%';
    }

    /* ── Mode ── */
    function setMode(m, doRender = true) {
      state.mode = m;
      document.getElementById('modeWave').classList.toggle('active', m === 'wave');
      document.getElementById('modeBlob').classList.toggle('active', m === 'blob');
      document.getElementById('waveControls').classList.toggle('hidden', m !== 'wave');
      document.getElementById('blobControls').classList.toggle('hidden', m !== 'blob');
      if (doRender) renderAll();
    }

    /* ── Layers + Style Helpers ── */
    function setLayers(n) {
      state.layers = n;
      document.querySelectorAll('#layersBtns .btn-group-btn').forEach((b, i) => {
        b.classList.toggle('active', i + 1 === n);
      });
      clearPreset();
      renderAll();
    }

    function setSmooth(val) {
      state.smooth = val;
      const btns = document.querySelectorAll('#styleBtns .btn-group-btn');
      btns[0].classList.toggle('active', val);
      btns[1].classList.toggle('active', !val);
      clearPreset();
      renderAll();
    }

    /* ── Randomize Seed ── */
    function randomizeSeed() {
      state.seed = Math.floor(Math.random() * 9000) + 1;
      document.getElementById('seedInput').value = state.seed;
      clearPreset();
      renderAll();
    }

    /* ── Background Select ── */
    function selectBg(key, btn) {
      currentBg = key;
      document.getElementById('previewStage').style.background = BG_THEMES[key];
      document.querySelectorAll('.bg-swatch').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    /* ── Render All ── */
    function renderAll() {
      renderPreview();
      renderSnippet();
    }

    /* ── Init ── */
    syncInputs();
    renderAll();
  </script>
</body>
</html>
